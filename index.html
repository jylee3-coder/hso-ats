<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSO 채용 ATS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --surface2: #eeece7;
  --border: #ddd9d0;
  --text: #1a1916;
  --muted: #8a8680;
  --accent: #c8502a;
  --accent2: #2a6ec8;
  --green: #2a8c5a;
  --yellow: #c8a02a;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
header { background: var(--text); color: #f5f3ee; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 200; }
.logo { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 12px; }
.logo-tag { background: var(--accent); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 3px; letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-nav { display: flex; gap: 4px; }
.nav-btn { padding: 6px 16px; background: transparent; color: rgba(245,243,238,0.6); border: 1px solid transparent; border-radius: 4px; font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.15s; }
.nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.nav-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: #f5f3ee; }
.btn-add-top { padding: 7px 16px; background: var(--green); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
.btn-refresh { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #f5f3ee; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-family: inherit; cursor: pointer; }

/* LOADING */
.loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; gap: 16px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* MAIN */
main { padding: 28px 40px; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.s1::before { background: var(--text); } .s2::before { background: var(--yellow); }
.s3::before { background: var(--accent2); } .s4::before { background: var(--green); } .s5::before { background: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
.stat-value { font-size: 30px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: -1px; }

/* VIEWS */
.view { display: none; } .view.active { display: block; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

/* KANBAN */
.kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 20px; }
.kanban-col { flex-shrink: 0; width: 270px; }
.kanban-col-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 8px 8px 0 0; border: 1px solid var(--border); border-bottom: none; background: var(--surface2); }
.col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
.col-dot { width: 8px; height: 8px; border-radius: 50%; }
.col-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); background: var(--border); padding: 2px 7px; border-radius: 10px; }
.kanban-cards { border: 1px solid var(--border); border-radius: 0 0 8px 8px; background: var(--surface2); padding: 8px; min-height: 120px; display: flex; flex-direction: column; gap: 8px; }

/* CARD */
.applicant-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow); }
.applicant-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(200,80,42,0.12); transform: translateY(-1px); }
.card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.card-position { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
.tag-dept { background: #eef2ff; color: #3545b0; }
.tag-platform { background: #fef3ee; color: var(--accent); }
.card-interview { font-size: 11px; color: var(--accent2); font-weight: 500; margin-bottom: 8px; }
.card-resume { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent2); text-decoration: none; font-weight: 500; padding: 5px 8px; background: #eef5ff; border-radius: 4px; }
.card-resume-empty { font-size: 11px; color: #bbb; padding: 5px 8px; background: var(--bg); border-radius: 4px; border: 1px dashed #ccc; }

/* TABLE */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--text); color: #f5f3ee; }
th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #faf9f7; }
.stage-badge { display: inline-flex; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.s-서류검토 { background: #fff8e6; color: #b07a00; }
.s-1차면접 { background: #eef2ff; color: #3545b0; }
.s-2차면접 { background: #fff0ee; color: #c8502a; }
.s-최종합격 { background: #f0fdf4; color: #1a7a45; }
.s-불합격 { background: #f5f5f5; color: #888; }

/* SCHEDULE */
.schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.schedule-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; border-left: 4px solid var(--accent2); }
.schedule-time { font-family: 'DM Mono', monospace; font-size: 15px; color: var(--accent2); margin-bottom: 6px; }
.schedule-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.schedule-meta { font-size: 12px; color: var(--muted); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 14px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: slideUp 0.2s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; }
.modal-title { font-size: 18px; font-weight: 700; }
.modal-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
.modal-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; }
.modal-body { padding: 20px 24px; }
.modal-section { margin-bottom: 20px; }
.modal-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 12px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1/-1; }
.form-label { font-size: 11px; color: var(--muted); font-weight: 500; }
.form-input { padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
.form-input:focus { border-color: var(--accent2); }
select.form-input { cursor: pointer; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 8px; border-top: 1px solid var(--border); }
.btn-cancel { padding: 9px 18px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
.btn-submit { padding: 9px 20px; background: var(--accent2); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
.btn-delete { padding: 9px 18px; background: #fff0ee; color: var(--accent); border: 1px solid #fad4c8; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

/* TOAST */
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: #f5f3ee; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 9999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.empty-col { text-align: center; color: #ccc; font-size: 12px; padding: 24px 0; }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">데이터 불러오는 중...</div>
</div>

<header>
  <div class="logo">HSO 채용 ATS <span class="logo-tag">LIVE</span></div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="showView('kanban',this)">칸반보드</button>
    <button class="nav-btn" onclick="showView('table',this)">지원자 목록</button>
    <button class="nav-btn" onclick="showView('schedule',this)">면접 일정</button>
  </nav>
  <div class="header-right">
    <button class="btn-refresh" onclick="loadData()">↻ 새로고침</button>
    <button class="btn-add-top" onclick="openAddModal()">+ 지원자 추가</button>
  </div>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card s1"><div class="stat-label">전체 지원자</div><div class="stat-value" id="st-total">—</div></div>
    <div class="stat-card s2"><div class="stat-label">서류 검토 중</div><div class="stat-value" id="st-review">—</div></div>
    <div class="stat-card s3"><div class="stat-label">면접 진행 중</div><div class="stat-value" id="st-interview">—</div></div>
    <div class="stat-card s4"><div class="stat-label">최종 합격</div><div class="stat-value" id="st-passed">—</div></div>
    <div class="stat-card s5"><div class="stat-label">불합격</div><div class="stat-value" id="st-rejected">—</div></div>
  </div>

  <div id="view-kanban" class="view active">
    <div class="section-header"><span class="section-title">전형 단계별 현황</span></div>
    <div class="kanban-board" id="kanban-board"></div>
  </div>

  <div id="view-table" class="view">
    <div class="section-header"><span class="section-title">지원자 전체 목록</span></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>이름</th><th>부서</th><th>포지션</th><th>플랫폼</th><th>채용단계</th><th>면접일</th><th>이력서</th><th>수정</th></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div id="view-schedule" class="view">
    <div class="section-header"><span class="section-title">면접 일정</span></div>
    <div class="schedule-grid" id="schedule-grid"></div>
  </div>
</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">지원자 추가</div>
        <div class="modal-subtitle" id="modal-subtitle">새 지원자 정보를 입력하세요</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">이름 *</label><input class="form-input" id="f-name" placeholder="홍길동"></div>
          <div class="form-group"><label class="form-label">부서 *</label><input class="form-input" id="f-dept" placeholder="플랫폼 사업팀"></div>
          <div class="form-group"><label class="form-label">포지션 *</label><input class="form-input" id="f-position" placeholder="OTA관리자"></div>
          <div class="form-group"><label class="form-label">지원 플랫폼</label>
            <select class="form-input" id="f-platform">
              <option>잡코리아</option><option>사람인</option><option>원티드</option><option>잡플래닛</option><option>그룹바이</option><option>기타</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">채용 단계</label>
            <select class="form-input" id="f-stage">
              <option>서류검토</option><option>1차면접</option><option>2차면접</option><option>최종합격</option><option>불합격</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">면접일</label><input class="form-input" id="f-interview" placeholder="수요일 오전 10:00"></div>
          <div class="form-group full"><label class="form-label">이력서 링크 (Google Drive)</label><input class="form-input" id="f-resume" placeholder="https://drive.google.com/..."></div>
          <div class="form-group full"><label class="form-label">연락처</label><input class="form-input" id="f-contact" placeholder="010-0000-0000"></div>
          <div class="form-group full"><label class="form-label">메모</label><textarea class="form-input" id="f-memo" rows="3" placeholder="특이사항, 메모 등..."></textarea></div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-delete" id="btn-delete" style="display:none" onclick="deleteApplicant()">삭제</button>
        <button class="btn-cancel" onclick="closeModalDirect()">취소</button>
        <button class="btn-submit" id="btn-submit" onclick="submitForm()">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let applicants = [];
let editingId = null;

// ── API ──
async function api(method, params = {}, body = null) {
  const qs = new URLSearchParams(params).toString();
  const url = `/api/applicants${qs ? '?' + qs : ''}`;
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}

// ── LOAD ──
async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  try {
    const data = await api('GET', { table: 'Applicants' });
    applicants = (data.records || []).map(r => ({
      id: r.id,
      name: r.fields['Name'] || r.fields['이름'] || '',
      dept: r.fields['Department'] || r.fields['부서'] || '',
      position: r.fields['Position Applied For'] || r.fields['포지션'] || '',
      platform: r.fields['Application Platform'] || r.fields['플랫폼'] || '',
      stage: r.fields['Hiring Stage'] || r.fields['채용단계'] || r.fields['Screening Status'] || '서류검토',
      interview: r.fields['Interview Date'] || r.fields['면접일'] || '',
      resume: r.fields['Resume Link'] || r.fields['이력서'] || '',
      contact: r.fields['Contact'] || r.fields['연락처'] || '',
      memo: r.fields['Notes'] || r.fields['메모'] || '',
    }));
    updateStats();
    buildKanban();
    buildTable();
    buildSchedule();
  } catch(e) {
    showToast('❌ 데이터 로드 실패');
  }
  document.getElementById('loading').style.display = 'none';
}

// ── STATS ──
function updateStats() {
  document.getElementById('st-total').textContent = applicants.length;
  document.getElementById('st-review').textContent = applicants.filter(a => (a.stage||'').includes('서류')).length;
  document.getElementById('st-interview').textContent = applicants.filter(a => (a.stage||'').includes('면접')).length;
  document.getElementById('st-passed').textContent = applicants.filter(a => (a.stage||'').includes('합격')).length;
  document.getElementById('st-rejected').textContent = applicants.filter(a => (a.stage||'').includes('불합격')).length;
}

// ── KANBAN ──
const STAGES = [
  { key:'서류검토', label:'서류 검토', color:'#c8a02a' },
  { key:'1차면접', label:'1차 면접', color:'#2a6ec8' },
  { key:'2차면접', label:'2차 면접', color:'#c8502a' },
  { key:'최종합격', label:'최종 합격', color:'#2a8c5a' },
  { key:'불합격', label:'불합격', color:'#aaa' },
];

function stageMatch(a, key) {
  const s = (a.stage||'').toLowerCase();
  if (key==='서류검토') return s.includes('서류') || s.includes('screening') || s.includes('검토중');
  if (key==='1차면접') return s.includes('1차');
  if (key==='2차면접') return s.includes('2차');
  if (key==='최종합격') return s.includes('합격') && !s.includes('불');
  if (key==='불합격') return s.includes('불합격');
  return false;
}

function buildKanban() {
  const board = document.getElementById('kanban-board');
  board.innerHTML = '';
  STAGES.forEach(stage => {
    const cards = applicants.filter(a => stageMatch(a, stage.key));
    const col = document.createElement('div');
    col.className = 'kanban-col';
    col.innerHTML = `
      <div class="kanban-col-header">
        <div class="col-title"><span class="col-dot" style="background:${stage.color}"></span>${stage.label}</div>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="kanban-cards">
        ${cards.length ? cards.map(cardHTML).join('') : '<div class="empty-col">없음</div>'}
      </div>`;
    board.appendChild(col);
  });
}

function cardHTML(a) {
  const resumeBtn = a.resume
    ? `<a class="card-resume" href="${a.resume}" target="_blank" onclick="event.stopPropagation()">📄 이력서 보기</a>`
    : `<div class="card-resume-empty">이력서 없음</div>`;
  return `
    <div class="applicant-card" onclick="openEditModal('${a.id}')">
      <div class="card-name">${a.name}</div>
      <div class="card-position">${a.position}</div>
      <div class="card-tags">
        ${a.dept ? `<span class="tag tag-dept">${a.dept}</span>` : ''}
        ${a.platform ? `<span class="tag tag-platform">${a.platform}</span>` : ''}
      </div>
      ${a.interview ? `<div class="card-interview">🕐 ${a.interview}</div>` : ''}
      ${resumeBtn}
    </div>`;
}

// ── TABLE ──
function buildTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = applicants.map(a => {
    const sc = stageClass(a.stage);
    const resumeCell = a.resume
      ? `<a href="${a.resume}" target="_blank" style="color:var(--accent2);font-size:12px;font-weight:600;text-decoration:none" onclick="event.stopPropagation()">📄 보기</a>`
      : `<span style="color:#ccc;font-size:12px">없음</span>`;
    return `<tr style="cursor:pointer" onclick="openEditModal('${a.id}')">
      <td style="font-weight:700">${a.name}</td>
      <td style="color:#666">${a.dept}</td>
      <td>${a.position}</td>
      <td style="color:#999">${a.platform}</td>
      <td><span class="stage-badge ${sc}">${a.stage}</span></td>
      <td style="color:var(--accent2);font-size:12px">${a.interview||'-'}</td>
      <td onclick="event.stopPropagation()">${resumeCell}</td>
      <td><button style="padding:4px 10px;border:1px solid var(--border);background:var(--surface2);border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit" onclick="event.stopPropagation();openEditModal('${a.id}')">수정</button></td>
    </tr>`;
  }).join('');
}

function stageClass(s) {
  if (!s) return 's-서류검토';
  if (s.includes('서류')||s.includes('검토')) return 's-서류검토';
  if (s.includes('1차')) return 's-1차면접';
  if (s.includes('2차')) return 's-2차면접';
  if (s.includes('합격')&&!s.includes('불')) return 's-최종합격';
  if (s.includes('불합격')) return 's-불합격';
  return 's-서류검토';
}

// ── SCHEDULE ──
function buildSchedule() {
  const grid = document.getElementById('schedule-grid');
  const withInterview = applicants.filter(a => a.interview);
  if (!withInterview.length) { grid.innerHTML = '<div style="color:var(--muted);font-size:13px">면접 일정 없음</div>'; return; }
  grid.innerHTML = withInterview.map(a => `
    <div class="schedule-card">
      <div class="schedule-time">${a.interview}</div>
      <div class="schedule-name">${a.name}</div>
      <div class="schedule-meta">${a.position} · ${a.dept} · ${a.stage}</div>
    </div>`).join('');
}

// ── MODAL ──
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '지원자 추가';
  document.getElementById('modal-subtitle').textContent = '새 지원자 정보를 입력하세요';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('btn-submit').textContent = '추가';
  clearForm();
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  editingId = id;
  const a = applicants.find(x => x.id === id);
  if (!a) return;
  document.getElementById('modal-title').textContent = a.name + ' 수정';
  document.getElementById('modal-subtitle').textContent = `${a.dept} · ${a.position}`;
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('btn-submit').textContent = '저장';
  document.getElementById('f-name').value = a.name;
  document.getElementById('f-dept').value = a.dept;
  document.getElementById('f-position').value = a.position;
  document.getElementById('f-platform').value = a.platform || '잡코리아';
  document.getElementById('f-stage').value = a.stage || '서류검토';
  document.getElementById('f-interview').value = a.interview;
  document.getElementById('f-resume').value = a.resume;
  document.getElementById('f-contact').value = a.contact;
  document.getElementById('f-memo').value = a.memo;
  document.getElementById('modal').classList.add('open');
}

function clearForm() {
  ['f-name','f-dept','f-position','f-interview','f-resume','f-contact','f-memo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-platform').value = '잡코리아';
  document.getElementById('f-stage').value = '서류검토';
}

function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); editingId = null; }

async function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('이름을 입력해주세요'); return; }
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = '저장 중...';

  const fields = {
    'Name': name,
    'Department': document.getElementById('f-dept').value,
    'Position Applied For': document.getElementById('f-position').value,
    'Application Platform': document.getElementById('f-platform').value,
    'Hiring Stage': document.getElementById('f-stage').value,
    'Interview Date': document.getElementById('f-interview').value,
    'Resume Link': document.getElementById('f-resume').value,
    'Contact': document.getElementById('f-contact').value,
    'Notes': document.getElementById('f-memo').value,
  };

  try {
    if (editingId) {
      await api('PATCH', { table: 'Applicants', id: editingId }, fields);
      showToast('✅ 수정 완료');
    } else {
      await api('POST', { table: 'Applicants' }, fields);
      showToast('✅ 지원자 추가 완료');
    }
    closeModalDirect();
    await loadData();
  } catch(e) {
    showToast('❌ 저장 실패');
  }
  btn.disabled = false;
  btn.textContent = editingId ? '저장' : '추가';
}

async function deleteApplicant() {
  if (!editingId) return;
  if (!confirm('정말 삭제하시겠습니까?')) return;
  try {
    await api('DELETE', { table: 'Applicants', id: editingId });
    showToast('🗑️ 삭제 완료');
    closeModalDirect();
    await loadData();
  } catch(e) {
    showToast('❌ 삭제 실패');
  }
}

// ── NAV ──
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadData();
</script>
</body>
</html>
